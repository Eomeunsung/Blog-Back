spring:
  application:
    name: blog

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    url: jdbc:mariadb://localhost:3306/blog?serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 12345678

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true
        show_sql: true

  blog:
    upload:
      path: Img

  web:
    resources:
      static-locations:
        - classpath:/static/
        - file:Img/

jwt:
  access-secret: 6EF3C725B7A8CDDE9656E6BBF875A8A70D3F52EFC2E9F24D9A4FF2B20D39B14A4
  refresh-secret: 1DF7DCA25F2E53946FF9D679397D7F11A8E84B6C93F91F10665F6EC1A62E5640
  access-expiration: 600000  # 10 min: 10min * 60 sec * 1000 millisecond
  refresh-expiration: 86400000  # 24 hours: 24 * 60 * 60 * 1000 millisecond

